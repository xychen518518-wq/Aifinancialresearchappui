name: Sync to shitu repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Figma Make repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync to shitu figma-ui and v0 branches
        env:
          SHITU_PAT: ${{ secrets.SHITU_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove .github dir to avoid needing workflow scope
          git rm -rf .github
          git commit -m "Sync from Figma Make (exclude workflows)"

          git remote add shitu https://x-access-token:${SHITU_PAT}@github.com/xychen518518-wq/shitu.git

          # Push to figma-ui branch (force overwrite)
          git push shitu HEAD:figma-ui --force

          # Push to v0 branch (force overwrite)
          git push shitu HEAD:v0/xychen518518-7697-e52ac3cd --force
